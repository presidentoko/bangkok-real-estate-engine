name: Weekly Tier B + score refresh

# Sundays 02:17 Asia/Bangkok = 19:17 UTC Saturday.
# Tier B (limited) refreshes ~250 oldest buildings → first_seen_at on
# listings preserves across UPSERTs, so days-on-market accumulates over
# weeks. compute_value_scores recomputes bubble_index. RPC recomputes
# per-condo DOM aggregates so the site reads them O(1).
#
# Runs on a self-hosted Windows runner: GH Actions ubuntu IPs get served
# Cloudflare interstitials by hipflat (verified 2026-05-12: 100% of
# fetched pages returned <title>Just a moment...</title> with the
# challenge-platform marker). A residential IP from a home connection
# passes through transparently.

on:
  schedule:
    - cron: "17 19 * * 6"
  workflow_dispatch:
    inputs:
      tier_b_limit:
        description: "Tier B max buildings this run"
        default: "250"

concurrency:
  group: weekly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: [self-hosted, windows, x64]
    # Tier B = ~10–15s/building × 250 ≈ 60min. Compute steps add ~5min.
    timeout-minutes: 240
    defaults:
      run:
        shell: powershell
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PYTHONUNBUFFERED: "1"
      PYTHONIOENCODING: "utf-8"
      TIER_B_LIMIT: ${{ inputs.tier_b_limit || '250' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tier B refresh (limited)
        # cmd.exe handles the 2>&1: Windows PowerShell 5.1 wraps native-cmd
        # stderr lines into ErrorRecord objects (NativeCommandError), which
        # makes the script exit 1 even though python ran fine. Letting cmd
        # do the redirect avoids that wrapping.
        run: |
          $limit = $env:TIER_B_LIMIT
          cmd /c "python scripts\enrich_buildings_b.py --limit $limit 2>&1" | Tee-Object -FilePath tier_b.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Snapshot prices + compute yields
        run: |
          cmd /c "python scripts\snapshot_prices.py 2>&1" | Tee-Object -FilePath snapshot.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmd /c "python scripts\compute_yields.py 2>&1" | Tee-Object -FilePath yields.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Recompute bubble_index + region averages
        run: |
          cmd /c "python scripts\compute_value_scores.py 2>&1" | Tee-Object -FilePath compute.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Analysis pipeline (risk + super_value + alerts + reports)
        run: |
          cmd /c "python scripts\run_analysis.py 2>&1" | Tee-Object -FilePath analysis.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Notify on success
        if: success() && env.TELEGRAM_BOT_TOKEN != ''
        run: |
          $ok = (Select-String -Path tier_b.log -Pattern 'ok=(\d+)' -AllMatches | Select-Object -Last 1).Matches.Groups[1].Value
          $fail = (Select-String -Path tier_b.log -Pattern 'fail=(\d+)' -AllMatches | Select-Object -Last 1).Matches.Groups[1].Value
          $upserted = (Select-String -Path compute.log -Pattern 'upserted \d+ value_scores rows' | Select-Object -Last 1).Line
          $alerts = (Select-String -Path analysis.log -Pattern 'underpriced: (\d+) new alerts' | Select-Object -Last 1).Matches.Groups[1].Value
          $super = (Select-String -Path analysis.log -Pattern 'super_value: (\d+) condos' | Select-Object -Last 1).Matches.Groups[1].Value
          $msg = "OK RealData weekly refresh - Tier B ok=$ok fail=$fail; $upserted; alerts=$alerts; super=$super"
          $body = @{ chat_id = $env:TELEGRAM_CHAT_ID; text = $msg }
          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_BOT_TOKEN)/sendMessage" -Method Post -Body $body | Out-Null

      - name: Notify on failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != ''
        run: |
          $msg = "FAIL RealData weekly refresh - see GitHub Actions run ${{ github.run_id }}"
          $body = @{ chat_id = $env:TELEGRAM_CHAT_ID; text = $msg }
          Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_BOT_TOKEN)/sendMessage" -Method Post -Body $body | Out-Null

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-refresh-${{ github.run_id }}
          path: |
            tier_b.log
            snapshot.log
            yields.log
            compute.log
            analysis.log
            tier_b_dumps/
          if-no-files-found: ignore
          retention-days: 30
