name: Weekly Tier B + score refresh

# Sundays 02:17 Asia/Bangkok = 19:17 UTC Saturday.
# Tier B (limited) refreshes ~250 oldest buildings → first_seen_at on
# listings preserves across UPSERTs, so days-on-market accumulates over
# weeks. compute_value_scores recomputes bubble_index. RPC recomputes
# per-condo DOM aggregates so the site reads them O(1).

on:
  schedule:
    - cron: "17 19 * * 6"
  workflow_dispatch:
    inputs:
      tier_b_limit:
        description: "Tier B max buildings this run"
        default: "250"

concurrency:
  group: weekly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Tier B = ~10–15s/building × 250 ≈ 60min. Compute steps add ~5min.
    timeout-minutes: 240
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PYTHONUNBUFFERED: "1"
      PYTHONIOENCODING: "utf-8"
      TIER_B_LIMIT: ${{ inputs.tier_b_limit || '250' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # nodriver drives a real Chrome via CDP. ubuntu-latest doesn't ship
      # one, so install chromium and the headful display nodriver expects.
      - name: Install Chromium + xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser xvfb dbus-x11
          # nodriver looks for `chrome` first; symlink so the lookup hits.
          sudo ln -sf "$(which chromium-browser)" /usr/local/bin/chrome

      - name: Tier B refresh (limited)
        # xvfb-run gives us a virtual display so nodriver's headless=False
        # init still works on a server without a real X display.
        run: |
          xvfb-run -a --server-args="-screen 0 1280x720x24" \
            python scripts/enrich_buildings_b.py --limit "$TIER_B_LIMIT" 2>&1 | tee tier_b.log

      - name: Recompute bubble_index + region averages
        run: python scripts/compute_value_scores.py 2>&1 | tee compute.log

      - name: Notify on success
        if: success() && env.TELEGRAM_BOT_TOKEN != ''
        run: |
          OK=$(grep -oE "ok=[0-9]+" tier_b.log | tail -1 | cut -d= -f2)
          FAIL=$(grep -oE "fail=[0-9]+" tier_b.log | tail -1 | cut -d= -f2)
          UPSERTED=$(grep -oE "upserted [0-9]+ value_scores rows" compute.log | tail -1)
          MSG="✅ RealData weekly refresh — Tier B ok=${OK:-?} fail=${FAIL:-?}; ${UPSERTED:-no value_scores upserted}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" > /dev/null

      - name: Notify on failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != ''
        run: |
          MSG="🚨 RealData weekly refresh FAILED — see GitHub Actions run ${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" > /dev/null

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-refresh-${{ github.run_id }}
          path: |
            tier_b.log
            compute.log
          if-no-files-found: ignore
          retention-days: 30
