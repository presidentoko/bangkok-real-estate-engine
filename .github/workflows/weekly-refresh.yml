name: Weekly Tier B + score refresh

# Sundays 02:17 Asia/Bangkok = 19:17 UTC Saturday.
# Tier B (limited) refreshes ~250 oldest buildings → first_seen_at on
# listings preserves across UPSERTs, so days-on-market accumulates over
# weeks. compute_value_scores recomputes bubble_index. RPC recomputes
# per-condo DOM aggregates so the site reads them O(1).

on:
  schedule:
    - cron: "17 19 * * 6"
  workflow_dispatch:
    inputs:
      tier_b_limit:
        description: "Tier B max buildings this run"
        default: "250"

concurrency:
  group: weekly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Tier B = ~10–15s/building × 250 ≈ 60min. Compute steps add ~5min.
    timeout-minutes: 240
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PYTHONUNBUFFERED: "1"
      PYTHONIOENCODING: "utf-8"
      TIER_B_LIMIT: ${{ inputs.tier_b_limit || '250' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # nodriver drives a real Chrome via CDP. ubuntu-latest ships
      # google-chrome-stable preinstalled; we avoid `chromium-browser`
      # because on Ubuntu 24.04 (noble) it's a transitional snap shim
      # that doesn't launch in GH Actions runners.
      - name: Setup Chrome + xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb dbus-x11
          # Ubuntu 24.04 restricts unprivileged user namespaces via AppArmor by
          # default; Chrome's multi-process / CDP setup uses user namespaces
          # internally so even --no-sandbox isn't enough — nodriver can't
          # establish the CDP socket and reports "Failed to connect to browser".
          # Disabling this restriction is the standard workaround on noble.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          # nodriver looks for `chrome` first; symlink so the lookup hits.
          sudo ln -sf "$(which google-chrome-stable)" /usr/local/bin/chrome
          # Sanity: prove the binary actually launches under xvfb before the
          # scraper. If this fails, the scraper would just give nodriver's
          # less-helpful "Failed to connect to browser".
          xvfb-run -a google-chrome-stable --no-sandbox --headless=new \
            --disable-gpu --disable-dev-shm-usage --dump-dom https://example.com \
            > /dev/null && echo "chrome smoke-test OK"

      - name: Diagnose chrome+CDP launch
        # nodriver swallows chrome's stderr and times out at 2.75s, so the
        # "Failed to connect to browser" error gives no hint why chrome died.
        # Reproduce nodriver's launch pattern with stderr exposed.
        run: |
          xvfb-run -a --server-args="-screen 0 1280x720x24" python - <<'PY'
          import subprocess, time, urllib.request, os, sys
          cmd = [
              "/usr/local/bin/chrome",
              "--no-sandbox", "--disable-setuid-sandbox",
              "--disable-dev-shm-usage",
              "--remote-debugging-port=9222",
              "--user-data-dir=/tmp/cr-diag",
              "--no-first-run", "--no-default-browser-check",
              "--lang=en-US",
              "about:blank",
          ]
          print("DISPLAY=", os.environ.get("DISPLAY"))
          print("launching:", " ".join(cmd))
          p = subprocess.Popen(cmd, stdout=subprocess.PIPE, stderr=subprocess.PIPE)
          time.sleep(3)
          alive = p.poll() is None
          print("alive after 3s?", alive, "pid", p.pid)
          if not alive:
              print("---STDERR---"); print(p.stderr.read().decode("utf8", "replace"))
              print("---STDOUT---"); print(p.stdout.read().decode("utf8", "replace"))
              sys.exit(0)  # don't fail the workflow on this diag step
          try:
              v = urllib.request.urlopen("http://127.0.0.1:9222/json/version", timeout=2).read()
              print("CDP version endpoint OK:", v[:200])
          except Exception as e:
              print("CDP fetch failed:", e)
          p.terminate()
          try:
              p.wait(timeout=3)
          except Exception:
              p.kill()
          # Last 80 lines of chrome stderr so we see late-startup errors too
          try:
              err = p.stderr.read().decode("utf8", "replace").splitlines()
              print("---chrome stderr tail---")
              for line in err[-80:]:
                  print(line)
          except Exception as e:
              print("stderr read err:", e)
          PY

      - name: Tier B refresh (limited)
        # xvfb-run gives us a virtual display so nodriver's headless=False
        # init still works on a server without a real X display.
        # pipefail so a python crash is not masked by tee's exit 0.
        run: |
          set -eo pipefail
          xvfb-run -a --server-args="-screen 0 1280x720x24" \
            python scripts/enrich_buildings_b.py --limit "$TIER_B_LIMIT" 2>&1 | tee tier_b.log

      - name: Recompute bubble_index + region averages
        run: python scripts/compute_value_scores.py 2>&1 | tee compute.log

      - name: Notify on success
        if: success() && env.TELEGRAM_BOT_TOKEN != ''
        run: |
          OK=$(grep -oE "ok=[0-9]+" tier_b.log | tail -1 | cut -d= -f2)
          FAIL=$(grep -oE "fail=[0-9]+" tier_b.log | tail -1 | cut -d= -f2)
          UPSERTED=$(grep -oE "upserted [0-9]+ value_scores rows" compute.log | tail -1)
          MSG="✅ RealData weekly refresh — Tier B ok=${OK:-?} fail=${FAIL:-?}; ${UPSERTED:-no value_scores upserted}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" > /dev/null

      - name: Notify on failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != ''
        run: |
          MSG="🚨 RealData weekly refresh FAILED — see GitHub Actions run ${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" > /dev/null

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-refresh-${{ github.run_id }}
          path: |
            tier_b.log
            compute.log
          if-no-files-found: ignore
          retention-days: 30
