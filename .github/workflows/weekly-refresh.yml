name: Weekly Tier B + score refresh

# Sundays 02:17 Asia/Bangkok = 19:17 UTC Saturday.
# Tier B (limited) refreshes ~250 oldest buildings → first_seen_at on
# listings preserves across UPSERTs, so days-on-market accumulates over
# weeks. compute_value_scores recomputes bubble_index. RPC recomputes
# per-condo DOM aggregates so the site reads them O(1).
#
# Runs on a self-hosted Windows runner: GH Actions ubuntu IPs get served
# Cloudflare interstitials by hipflat (verified 2026-05-12: 100% of
# fetched pages returned <title>Just a moment...</title> with the
# challenge-platform marker). A residential IP from a home connection
# passes through transparently.

on:
  # RE-ENABLED 2026-07-21: was paused since 2026-07-12 for the old Supabase
  # project's egress overage (94%+, reset not due until 2026-08-04). Migrated
  # to a fresh Supabase project instead of waiting for the reset, so the
  # egress counter is back to 0 -- no need to wait for 8/4 anymore. The
  # per-listing write fix (returning="minimal", commit c9f0374) is still in
  # place, so per-run egress should be lower than before the pause too.
  schedule:
    - cron: "17 19 * * 6"
  workflow_dispatch:
    inputs:
      tier_b_limit:
        description: "Tier B max buildings this run"
        default: "250"

concurrency:
  group: weekly-refresh
  cancel-in-progress: false

permissions:
  # Auto-blog step pushes a new commit with the generated post JSON.
  contents: write

jobs:
  refresh:
    runs-on: [self-hosted, windows, x64]
    # Ingest steps (DotProperty 40+ cities + DDProperty 5 cities + FazWaz
    # 6 cities + foreign quota) dominate runtime: budget ~6h. Tier B itself
    # is ~60min, compute steps ~5min, plus inter-city settle delays.
    timeout-minutes: 540
    defaults:
      run:
        shell: powershell
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      PYTHONUNBUFFERED: "1"
      PYTHONIOENCODING: "utf-8"
      TIER_B_LIMIT: ${{ inputs.tier_b_limit || '250' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─────────────────────────────────────────────────────────────
      # Fresh-listing ingestion. continue-on-error per source so one
      # site's CF block or layout change doesn't kill the macro/Tier-B
      # steps below. Telegram summary at the bottom flags failures.
      # ─────────────────────────────────────────────────────────────

      # Per-step timeout-minutes on every ingest/scraping step below: the
      # job-level timeout-minutes: 540 is a hard kill that continue-on-error
      # cannot override, so without a per-step budget one slow/hanging
      # source (e.g. a Cloudflare stall) could burn the entire 540-minute
      # window and starve the scoring/analysis tail (mark_stale onward) of
      # any runtime at all — which is exactly what's been happening (0%
      # weekly success in the last 10 runs). Caps below sum to ~450min,
      # leaving a margin for setup + the scoring tail within the 540min
      # ceiling, well above the ~425min historical baseline noted below.

      - name: Ingest BOT macro indicators
        continue-on-error: true
        timeout-minutes: 15
        run: |
          cmd /c "python scripts\ingest_bot.py 2>&1" | Tee-Object -FilePath ingest_bot.log
          if ($LASTEXITCODE -ne 0) {
            Write-Output "::warning::ingest_bot exited $LASTEXITCODE"
            Add-Content -Path ingest_bot.log -Value "CI_STEP_FAILED::bot"
          }

      - name: Sweep DotProperty (Thailand-wide)
        continue-on-error: true
        timeout-minutes: 150
        run: |
          cmd /c "python scripts\sweep_dotproperty_thailand.py 2>&1" | Tee-Object -FilePath ingest_dotproperty.log
          if ($LASTEXITCODE -ne 0) {
            Write-Output "::warning::sweep_dotproperty exited $LASTEXITCODE"
            Add-Content -Path ingest_dotproperty.log -Value "CI_STEP_FAILED::dp"
          }

      - name: Sweep DDProperty (priority cities, sale)
        continue-on-error: true
        timeout-minutes: 60
        run: |
          cmd /c "python scripts\sweep_ddproperty_sale_only.py 2>&1" | Tee-Object -FilePath ingest_ddproperty.log
          if ($LASTEXITCODE -ne 0) {
            Write-Output "::warning::sweep_ddproperty exited $LASTEXITCODE"
            Add-Content -Path ingest_ddproperty.log -Value "CI_STEP_FAILED::dd"
          }

      - name: Ingest FazWaz (priority cities, sale)
        continue-on-error: true
        timeout-minutes: 90
        run: |
          $cities = @("bangkok", "phuket", "pattaya", "chiang-mai", "hua-hin", "chonburi")
          foreach ($city in $cities) {
            Write-Output "=== FazWaz sale: $city ==="
            cmd /c "python scripts\ingest_fazwaz.py --city $city --listing-type sale 2>&1" | Tee-Object -FilePath "ingest_fazwaz_$city.log"
            if ($LASTEXITCODE -ne 0) {
              Write-Output "::warning::ingest_fazwaz $city exited $LASTEXITCODE"
              Add-Content -Path "ingest_fazwaz_$city.log" -Value "CI_STEP_FAILED::fz-$city"
            }
          }

      - name: Ingest FazWaz foreign quota (stale only)
        continue-on-error: true
        timeout-minutes: 45
        run: |
          cmd /c "python scripts\ingest_foreign_quota.py --refresh-days 30 2>&1" | Tee-Object -FilePath ingest_foreign_quota.log
          if ($LASTEXITCODE -ne 0) {
            Write-Output "::warning::ingest_foreign_quota exited $LASTEXITCODE"
            Add-Content -Path ingest_foreign_quota.log -Value "CI_STEP_FAILED::fq"
          }

      - name: Tier B refresh (limited)
        # cmd.exe handles the 2>&1: Windows PowerShell 5.1 wraps native-cmd
        # stderr lines into ErrorRecord objects (NativeCommandError), which
        # makes the script exit 1 even though python ran fine. Letting cmd
        # do the redirect avoids that wrapping.
        #
        # continue-on-error: true — this used to `exit $LASTEXITCODE` on
        # failure, which (without continue-on-error) aborted the whole job
        # and skipped every step after it: mark_stale_listings, snapshot,
        # yields, cleanup, rematch, compute_value_scores, run_analysis, and
        # the auto-blog step. That cascade is why the scoring/analysis tail
        # has not executed via CI in 10+ weeks. Tier B failing/timing out
        # should degrade this run, not zero out the whole weekly pipeline.
        continue-on-error: true
        timeout-minutes: 90
        run: |
          $limit = $env:TIER_B_LIMIT
          cmd /c "python scripts\enrich_buildings_b.py --limit $limit 2>&1" | Tee-Object -FilePath tier_b.log
          if ($LASTEXITCODE -ne 0) {
            Write-Output "::warning::enrich_buildings_b exited $LASTEXITCODE"
            Add-Content -Path tier_b.log -Value "CI_STEP_FAILED::tierb"
          }

      - name: Mark stale listings inactive
        # dotproperty/ddproperty/fazwaz listings are only ever flipped to
        # is_active=true on sighting; nothing else ever flips them back, so
        # sold/delisted listings would otherwise pollute every median
        # forever. 21-day cutoff (not 7) so a single missed weekly run
        # doesn't mass-deactivate still-live listings.
        continue-on-error: true
        run: |
          cmd /c "python scripts\mark_stale_listings.py --apply --days 21 2>&1" | Tee-Object -FilePath stale.log
          if ($LASTEXITCODE -ne 0) {
            Write-Output "::warning::mark_stale_listings exited $LASTEXITCODE"
            Add-Content -Path stale.log -Value "CI_STEP_FAILED::stale"
          }

      - name: Snapshot prices + compute yields
        run: |
          cmd /c "python scripts\snapshot_prices.py 2>&1" | Tee-Object -FilePath snapshot.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmd /c "python scripts\compute_yields.py 2>&1" | Tee-Object -FilePath yields.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Data quality cleanup + fuzzy rematch
        # Catches new yield outliers from this scrape + tries Levenshtein
        # ≤2 matching for orphans the base+aggressive normalizers missed.
        # Both idempotent — safe weekly.
        run: |
          cmd /c "python scripts\cleanup_data_quality.py --apply 2>&1" | Tee-Object -FilePath cleanup.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmd /c "python scripts\rematch_listings.py --fuzzy --apply 2>&1" | Tee-Object -FilePath rematch.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Recompute bubble_index + region averages
        run: |
          cmd /c "python scripts\compute_value_scores.py 2>&1" | Tee-Object -FilePath compute.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Analysis pipeline (risk + super_value + alerts + reports)
        run: |
          cmd /c "python scripts\run_analysis.py 2>&1" | Tee-Object -FilePath analysis.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Prune price_history / condo_market_chart / underpriced_alerts
        # Unbounded-growth cleanup (price_history ~793k rows and growing
        # ~1.9M rows/year at current cadence; condo_market_chart re-inserts
        # its whole series on every Tier-B revisit). Keeps the most recent
        # 2 snapshots per condo full-resolution, thins price_history beyond
        # 6 months to 1 row/condo/month, and drops underpriced_alerts older
        # than 90 days. See scripts/prune_price_history.py's docstring for
        # the read-path investigation behind these numbers.
        continue-on-error: true
        run: |
          cmd /c "python scripts\prune_price_history.py --apply 2>&1" | Tee-Object -FilePath prune.log
          if ($LASTEXITCODE -ne 0) {
            Write-Output "::warning::prune_price_history exited $LASTEXITCODE"
            Add-Content -Path prune.log -Value "CI_STEP_FAILED::prune"
          }

      - name: Auto-blog — generate + verify + push
        # Pulls a story off the rotating topic dial (yield-spread,
        # foreign-quota, city-spotlight), generates a JSON post via
        # Claude Sonnet, re-verifies every numeric claim against the DB,
        # writes web/content/weekly/{slug}.json, then commits & pushes.
        # continue-on-error: a missing ANTHROPIC_API_KEY or a thin-data
        # week skips the post cleanly without failing the whole refresh.
        continue-on-error: true
        run: |
          cmd /c "python scripts\generate_weekly_post.py 2>&1" | Tee-Object -FilePath autoblog.log
          if ($LASTEXITCODE -ne 0) { Write-Output "::warning::generate_weekly_post exited $LASTEXITCODE" }

      - name: Notify on success
        if: success() && env.TELEGRAM_BOT_TOKEN != ''
        # PowerShell + Invoke-RestMethod, not bash/curl — bash does not
        # exist on this Windows runner, so every prior `shell: bash` notify
        # step has silently no-op'd since 2026-05-19 (production logs show
        # `##[error]bash: command not found`). The earlier PowerShell
        # attempt's reported 404s were almost certainly the bot token being
        # interpolated from a single-quoted string (never expanded) rather
        # than an inherent PowerShell/Telegram problem; -Body as a hashtable
        # here lets Invoke-RestMethod form-encode chat_id/text for us so
        # there's no manual URL string-building to get wrong.
        #
        # Failure detection: each ingest step above now writes a literal
        # "CI_STEP_FAILED::<label>" line into its own log via Add-Content
        # when $LASTEXITCODE is non-zero (the old approach grepped log
        # files for "::warning::", but that annotation is written only to
        # the live workflow console via Write-Output, never into the log
        # file itself — so the grep could never match, and every run
        # silently reported "ok").
        run: |
          function Get-StepStatus($path, $label) {
            if (-not (Test-Path $path)) { return "$label=skip" }
            if (Select-String -Path $path -Pattern '^CI_STEP_FAILED::' -Quiet) { return "$label=FAIL" }
            return "$label=ok"
          }
          $bot = Get-StepStatus "ingest_bot.log" "bot"
          $dp  = Get-StepStatus "ingest_dotproperty.log" "dp"
          $dd  = Get-StepStatus "ingest_ddproperty.log" "dd"
          $fq  = Get-StepStatus "ingest_foreign_quota.log" "fq"

          $fazwaz = ""
          Get-ChildItem -Path . -Filter "ingest_fazwaz_*.log" -ErrorAction SilentlyContinue | ForEach-Object {
            $city = $_.BaseName -replace '^ingest_fazwaz_', ''
            $status = if (Select-String -Path $_.FullName -Pattern '^CI_STEP_FAILED::' -Quiet) { "FAIL" } else { "ok" }
            $fazwaz += " fz-$city=$status"
          }

          $okN = (Select-String -Path "tier_b.log" -Pattern 'ok=\d+' -ErrorAction SilentlyContinue | Select-Object -Last 1).Matches.Value
          $failN = (Select-String -Path "tier_b.log" -Pattern 'fail=\d+' -ErrorAction SilentlyContinue | Select-Object -Last 1).Matches.Value
          $upserted = (Select-String -Path "compute.log" -Pattern 'upserted \d+ value_scores rows' -ErrorAction SilentlyContinue | Select-Object -Last 1).Matches.Value
          $alerts = (Select-String -Path "analysis.log" -Pattern 'underpriced: \d+ new alerts' -ErrorAction SilentlyContinue | Select-Object -Last 1).Matches.Value
          $super = (Select-String -Path "analysis.log" -Pattern 'super_value: \d+ condos' -ErrorAction SilentlyContinue | Select-Object -Last 1).Matches.Value

          $msg = "OK RealData weekly refresh`nIngest: $bot $dp $dd $fq$fazwaz`nTier B $okN $failN; $upserted; $alerts; $super"

          $uri = "https://api.telegram.org/bot$($env:TELEGRAM_BOT_TOKEN)/sendMessage"
          try {
            Invoke-RestMethod -Uri $uri -Method Post -TimeoutSec 15 -ContentType "application/x-www-form-urlencoded" -Body @{
              chat_id = $env:TELEGRAM_CHAT_ID
              text    = $msg
            } | Out-Null
            Write-Output "Telegram notify: sent"
          } catch {
            Write-Output "Telegram notify failed: $($_.Exception.Message)"
          }

      - name: Notify on failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != ''
        run: |
          $msg = "FAIL RealData weekly refresh - see https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $uri = "https://api.telegram.org/bot$($env:TELEGRAM_BOT_TOKEN)/sendMessage"
          try {
            Invoke-RestMethod -Uri $uri -Method Post -TimeoutSec 15 -ContentType "application/x-www-form-urlencoded" -Body @{
              chat_id = $env:TELEGRAM_CHAT_ID
              text    = $msg
            } | Out-Null
            Write-Output "Telegram notify: sent"
          } catch {
            Write-Output "Telegram notify failed: $($_.Exception.Message)"
          }

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-refresh-${{ github.run_id }}
          path: |
            ingest_bot.log
            ingest_dotproperty.log
            ingest_ddproperty.log
            ingest_fazwaz_*.log
            ingest_foreign_quota.log
            tier_b.log
            stale.log
            snapshot.log
            yields.log
            cleanup.log
            rematch.log
            compute.log
            analysis.log
            prune.log
            autoblog.log
            tier_b_dumps/
          if-no-files-found: ignore
          retention-days: 30
