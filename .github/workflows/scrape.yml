name: Bangkok Real Estate Engine

on:
  schedule:
    # 02:17 Asia/Bangkok (UTC+7) → 19:17 UTC the day before
    - cron: "17 19 * * *"
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Max pages per source"
        default: "5"

concurrency:
  group: bangkok-real-estate-engine
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
      SCRAPE_MAX_PAGES: ${{ inputs.max_pages || '5' }}
      HEADLESS: "true"
      LOG_LEVEL: "INFO"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run pipeline
        run: python -m src.main 2>&1 | tee pipeline.log

      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ github.run_id }}
          path: pipeline.log
          if-no-files-found: ignore
          retention-days: 14
